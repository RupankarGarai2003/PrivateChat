<!DOCTYPE html>
<html>

<head>
    <title>Private Chat</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>PRIVATE CHAT</h1>

<input
id="nameInput"
placeholder="Enter Your Name">

<button id="createBtn">
Create Room
</button>

<p id="roomID"></p>

<input
id="joinInput"
placeholder="Enter Room ID">

<button id="joinBtn">
Join Room
</button>

<hr>

<div id="chatBox" style="display:none;">

<div id="messages"></div>

<input
id="messageInput"
placeholder="Type your message...">

<button id="sendBtn">
Send
</button>

</div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>

</html>
